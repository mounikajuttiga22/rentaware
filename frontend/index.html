<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RentAware AI</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

    <div class="layout">

        <aside class="sidebar">

            <h2>🏠 RentAware</h2>

            <nav>
                <a class="active">Dashboard</a>
                <a>Agreements</a>
                <a>Alerts</a>
            </nav>

        </aside>



        <main class="main">

            <header class="topbar">

                <h1>AI Rental Agreement Analyzer</h1>

                <button id="uploadBtn">Upload Agreement</button>

                <input type="file" id="fileInput" hidden accept=".pdf">

            </header>



            <section class="grid">

                <div class="card">

                    <h3>Risk Score</h3>

                    <div class="chart">

                        <canvas id="riskChart"></canvas>

                        <div id="riskLevel">N/A</div>

                    </div>

                    <p id="riskReason">Waiting for analysis</p>

                </div>



                <div class="card">

                    <h3>Detected Clauses</h3>

                    <div id="clausesList">No clauses yet</div>

                </div>



                <div class="card">

                    <h3>Alerts</h3>

                    <div id="alertsList">No alerts</div>

                </div>

            </section>



            <section class="card chat">

                <h3>AI Assistant</h3>

                <div id="chatContainer" class="chatbox">

                    <div class="msg bot">Upload a document first</div>

                </div>

                <div class="chatinput">

                    <input id="chatInput" placeholder="Ask about agreement">

                    <button id="sendBtn">Send</button>

                </div>

            </section>

        </main>

    </div>



    <script src="assets/js/app.js"></script>

</body>

</html>
